name: build

# Publishing a GitHub release builds the installers for all three platforms and
# uploads them to that release. Manual runs (workflow_dispatch) just build and
# upload the installers as workflow artifacts, without touching any release.
on:
  workflow_dispatch:
  release:
    types:
      - published

# Needed to upload the built installers to the release.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: ubuntu-22.04
          - platform: macos-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            build-essential \
            pkg-config \
            wget

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # On a release event this uploads the installers to that release;
          # on manual runs releaseId is empty, so it only builds.
          releaseId: ${{ github.event.release.id }}

      - name: Upload installers as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: photo-archiver-${{ matrix.platform }}
          if-no-files-found: warn
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/release/*.exe
